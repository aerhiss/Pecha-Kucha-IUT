<!DOCTYPE html>
<html>
    <head>
        <title>Pecha Kucha IUT Nantes</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/3.6.0/css/reveal.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/3.6.0/css/theme/white.min.css">
        <style>
            #countdown {
                position: absolute;
                top: 20px;
                right: 20px;
                height: 40px;
                width: 40px;
                text-align: center;
                display: none; /* Caché au départ, le temps de trouver les images */
            }

            #countdown-number {
                position: absolute;
                color: white;
                line-height: 40px;
                z-index: 1;
                left: 0;
                right: 0;
                text-align: center;
                font-family: Helvetica, sans-serif;
                font-size: 18px;
            }

            svg {
                position: absolute;
                top: 0;
                right: 0;
                width: 40px;
                height: 40px;
                transform: rotateY(-180deg) rotateZ(-90deg);
            }

            #countdown-bg {
                fill: rgba(0,0,0,0.4);
            }

            #countdowner {
                stroke-dasharray: 113px;
                stroke-dashoffset: 0px;
                stroke-linecap: round;
                stroke-width: 2px;
                stroke: white;
                fill: none;
            }

            @keyframes countdown {
                from { stroke-dashoffset: 0px; }
                to { stroke-dashoffset: 113px; }
            }
            
            /* Petit message de chargement */
            #loading-msg {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-family: sans-serif;
                font-size: 24px;
                color: #333;
                z-index: 1000;
            }
        </style>
    </head>
    <body>
        <div id="loading-msg">Recherche des images en cours...</div>
        
        <div class="reveal">
            <div class="slides"></div>
        </div>
        
        <div id="countdown">
            <div id="countdown-number"></div>
            <svg>
                <circle id="countdown-bg" r="20" cx="20" cy="20"></circle>
                <circle id="countdowner" r="18" cx="20" cy="20"></circle>
            </svg>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/3.6.0/js/reveal.min.js"></script>
        <script>
            const usp = new URLSearchParams(window.location.search);
            const numslides = usp.get('numslides') || 20;
            const bgcolor = usp.get('bgcolor') || '#fff';
            const user = usp.get('user');
            const repo = usp.get('repo');
            const delay = usp.get('delay') || 5;
            
            const slidesContainer = document.querySelector('.reveal > .slides');
            const countdownDiv = document.querySelector('#countdown');
            const loadingMsg = document.querySelector('#loading-msg');
            const formatsAutorises = ['jpg', 'png', 'jpeg', 'avif', 'webp'];

            if (!(user && repo)) {
                loadingMsg.textContent = "Erreur : Utilisateur ou dépôt non spécifié dans l'URL.";
                throw "User or repository unspecified";
            }

            async function trouverUrlImage(i) {
                const basePath = `https://raw.githubusercontent.com/${user}/${repo}/main/${i}`;
                
                for (const ext of formatsAutorises) {
                    const testUrl = `${basePath}.${ext}`;
                    try {
                        const response = await fetch(testUrl, { method: 'HEAD' });
                        if (response.ok) {
                            return testUrl;
                        }
                    } catch (e) {
                    }
                }
                return `${basePath}.jpg`; 
            }

            async function initialiserPresentation() {
                const promessesSlides = [];
                for (let i = 0; i < numslides; i++) {
                    const slidePromise = trouverUrlImage(i + 1).then(urlValide => {
                        const slide = document.createElement('section');
                        slide.setAttribute('data-background-size', 'contain');
                        slide.setAttribute('data-background-color', bgcolor);
                        slide.setAttribute('data-background-image', urlValide);
                        return slide;
                    });
                    promessesSlides.push(slidePromise);
                }

                const slidesGenerees = await Promise.all(promessesSlides);
                slidesGenerees.forEach(slide => slidesContainer.appendChild(slide));
                loadingMsg.style.display = 'none';
                countdownDiv.style.display = 'block';
                demarrerRevealEtMinuteur();
            }
            const countdownNumber = document.querySelector('#countdown-number');
            const countdowner = document.querySelector('#countdowner');
            let countdownId;

            function tick() {
                const oldVal = parseInt(countdownNumber.textContent);
                if (oldVal === 0) {
                    clearInterval(countdownId);
                    return;
                }
                countdownNumber.textContent = oldVal - 1;
            }

            function initializeCountdown() {
                countdownNumber.textContent = delay;
                setTimeout(() => {
                    countdowner.style.animation = ``;
                    setTimeout(() => {
                        countdowner.style.animation = `countdown ${delay}s linear 1 forwards`;
                    }, 15);
                }, 15);

                if (countdownId) clearInterval(countdownId);
                countdownId = setInterval(tick, 1000);
            }

            function demarrerRevealEtMinuteur() {
                Reveal.initialize({
                    autoSlide: delay * 1000,
                    autoSlideStoppable: false,
                    slideNumber: true,
                });

                initializeCountdown();
                Reveal.addEventListener('slidechanged', initializeCountdown);
            }

            // --- Lancement du script ---
            initialiserPresentation();
        </script>
    </body>
</html>
